name: Weekend Research

on:
  schedule:
    - cron: '0 19 * * 6'  # Saturday 2:00pm EST (UTC-5); adjust to '0 18' during EDT
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-finbert-${{ runner.os }}

      - name: Run weekend research
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python main.py --research
